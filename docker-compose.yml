services:

  # ── Mock TMS (fake legacy TCP server) ──────────────────────────────────────
  mock-tms:
    build: .
    command: >
      python -m mock_tms.server
      --host 0.0.0.0
      --port 9000
      --token ${TMS_AUTH_TOKEN:-test-token}
    ports:
      - "9000:9000"   # expose pour pouvoir lancer probe.py depuis l'hôte
    networks:
      - tms-net
    healthcheck:
      test: ["CMD", "python", "-c",
             "import socket; s=socket.create_connection(('localhost',9000),2); s.close()"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── REST API ────────────────────────────────────────────────────────────────
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Pointe sur le mock TMS via le réseau Docker interne (nom du service = hostname)
      TMS_HOST: mock-tms
      TMS_PORT: "9000"
    depends_on:
      mock-tms:
        condition: service_healthy
    networks:
      - tms-net

networks:
  tms-net:
    driver: bridge
